<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-primary mb-0">Kirim Newsletter (Broadcast)</h3>
        
        <div class="d-flex gap-2 align-items-center">
            <label class="small text-muted fw-semibold mb-0 d-none d-md-block"><i class="bi bi-calendar-event me-1"></i>Filter:</label>
            <input type="month" id="monthFilter" class="form-control form-control-sm shadow-sm" style="width: auto; cursor: pointer;" onchange="filterTablesByMonth()">
            
            <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 shadow-sm" onclick="document.getElementById('monthFilter').value=''; filterTablesByMonth();" title="Reset Filter">
                <i class="bi bi-x-circle"></i>
            </button>
            <button class="btn btn-outline-primary btn-sm rounded-pill px-3 shadow-sm" onclick="loadDrafts(); loadLogAktivitas();">
                <i class="bi bi-arrow-clockwise me-1"></i> Refresh Data
            </button>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4 rounded-3">
        <div class="card-header bg-white py-3">
            <h5 class="fw-bold text-dark mb-0"><i class="bi bi-envelope-paper me-2 text-primary"></i> Draf Newsletter Tersimpan</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive" style="max-height: 40vh; overflow-y: auto;">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light position-sticky top-0 shadow-sm" style="z-index: 1;">
                        <tr>
                            <th class="py-3 px-4" style="width: 50%;">Nama File Draft</th>
                            <th class="py-3" style="width: 30%;">Terakhir Diubah</th>
                            <th class="py-3 text-center" style="width: 20%;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="draftTableBody">
                        <tr><td colspan="3" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Memuat draf...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-header bg-white py-3">
            <h5 class="fw-bold text-dark mb-0"><i class="bi bi-clock-history me-2 text-secondary"></i> Log Aktivitas Broadcast</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-bordered mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="py-2 px-3" style="width: 20%;">Tanggal</th>
                            <th class="py-2 px-3" style="width: 60%;">Aktivitas / Judul Broadcast</th>
                            <th class="py-2 px-3 text-center" style="width: 20%;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                        <tr>
                            <td colspan="3" class="text-center py-4 text-muted">
                                <div class="spinner-border spinner-border-sm me-2"></div>Memuat Log Aktivitas...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h5 class="modal-title mb-0 text-truncate" id="modalDraftTitle" style="max-width: 60%;"><i class="bi bi-file-earmark-text me-2"></i> Preview Draft</h5>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-warning text-white border-white btn-action" onclick="editDraftInBuilder()" title="Edit Draft">
                        <i class="bi bi-pencil-square"></i> Edit via Form
                    </button>
                    <button class="btn btn-sm btn-outline-danger text-white border-white btn-action" onclick="deleteCurrentDraft()" title="Hapus Draft">
                        <i class="bi bi-trash"></i> Hapus
                    </button>
                    <button type="button" class="btn-close btn-close-white ms-2" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
            </div>
            
            <div class="modal-body p-0 position-relative bg-secondary">
                <iframe id="previewFrame" style="width: 100%; height: 65vh; border: none; background: #f4f5f7; display: block;"></iframe>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="sendModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="bi bi-send-check-fill me-2"></i> Pengaturan Pengiriman</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body bg-light">
                <h6 class="fw-bold text-dark mb-3" id="sendDraftNameDisplay">Nama Draft</h6>
                
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Layer 1: Target Audiens</label>
                    <select class="form-select shadow-sm" id="filterLayer1" onchange="toggleFilterView()">
                        <option value="alumni">Data Alumni</option>
                        <option value="non_alumni">Data Non-Alumni</option>
                    </select>
                </div>

                <div id="alumniFiltersContainer">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Layer 2: Metode Filter</label>
                        <select class="form-select shadow-sm" id="filterLayer2" onchange="updateLayer3()">
                            <option value="all">Kirim ke Semua Alumni (Tanpa Filter)</option>
                            <option value="angkatan">Berdasarkan Angkatan</option>
                            <option value="kategori">Berdasarkan Kategori Umur/Angkatan</option>
                            <option value="lokasi">Berdasarkan Lokasi</option>
                        </select>
                    </div>

                    <div class="mb-3" id="layer3Container" style="display: none;">
                        <label class="form-label small fw-semibold text-primary">Layer 3: Pilih Spesifikasi</label>
                        <select class="form-select border-primary shadow-sm" id="filterLayer3" onchange="calculateRecipients()"></select>
                    </div>
                </div>

                <div id="nonAlumniFiltersContainer" style="display: none;">
                    <div class="mb-2">
                        <label class="form-label small fw-semibold">Kategori Instansi</label>
                        <select class="form-select shadow-sm border-success" id="naFilterKategori" onchange="calculateRecipients()">
                            <option value="ALL">Semua Kategori</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small fw-semibold">Lingkup Wilayah</label>
                        <select class="form-select shadow-sm border-success" id="naFilterLingkup" onchange="calculateRecipients()">
                            <option value="ALL">Semua Lingkup</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Lokasi Spesifik (Prov/Negara)</label>
                        <select class="form-select shadow-sm border-success" id="naFilterLokasi" onchange="calculateRecipients()">
                            <option value="ALL">Semua Lokasi</option>
                        </select>
                    </div>
                </div>

                <hr>

                <div class="alert alert-info py-2 mb-0 d-flex align-items-center">
                    <i class="bi bi-people-fill fs-4 me-3"></i>
                    <div>
                        <div class="small text-muted">Estimasi Penerima</div>
                        <h4 class="fw-bold mb-0 text-dark" id="recipientCount">0 <span class="fs-6 fw-normal">Email Valid</span></h4>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-success fw-bold px-4" id="btnExecuteSend" onclick="confirmSendBroadcast()">
                    <i class="bi bi-rocket-takeoff me-1"></i> Mulai Kirim
                </button>
            </div>
        </div>
    </div>
</div>
