<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-primary mb-0">Database Alumni</h3>
        <button class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="refreshData()">
            <i class="bi bi-arrow-clockwise me-1"></i> Refresh Data
        </button>
    </div>

    <div class="alert alert-info border-0 shadow-sm mb-4 d-flex align-items-center" style="border-radius: 10px;">
        <i class="bi bi-info-circle-fill me-2 fs-5"></i> 
        <span>Data terakhir diperbarui: <strong>24 Februari 2026</strong></span>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body bg-light rounded">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-semibold text-muted">Cari Nama</label>
                    <div class="input-group input-group-sm shadow-sm">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="searchNama" placeholder="Ketik nama..." onkeyup="applyFilters()">
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted">Angkatan</label>
                    <select class="form-select form-select-sm border-0 shadow-sm" id="filterAngkatan" onchange="applyFilters()">
                        <option value="ALL">Semua Angkatan</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted">Tahun Lulus</label>
                    <select class="form-select form-select-sm border-0 shadow-sm" id="filterTahunLulus" onchange="applyFilters()">
                        <option value="ALL">Semua Tahun</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted">Lokasi</label>
                    <select class="form-select form-select-sm border-0 shadow-sm" id="filterLokasi" onchange="applyFilters()">
                        <option value="ALL">Semua Lokasi</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold text-muted d-block">Urutkan Hasil</label>
                    <div class="btn-group w-100 shadow-sm" role="group">
                        <button type="button" id="btnSortNama" class="btn btn-sm btn-light border btn-sort" onclick="sortData('nama')">
                            <i class="bi bi-sort-alpha-down"></i> Nama
                        </button>
                        <button type="button" id="btnSortNiu" class="btn btn-sm btn-light border btn-sort" onclick="sortData('niu')">
                            <i class="bi bi-sort-numeric-down"></i> NIU
                        </button>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-end mt-3">
                <button class="btn btn-sm btn-outline-danger rounded-pill px-3 shadow-sm" onclick="clearFilters()">
                    <i class="bi bi-x-circle me-1"></i> Clear Filter
                </button>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4 rounded-3 overflow-hidden">
        <div class="card-body p-0">
            <div class="table-responsive" style="max-height: 70vh; overflow-y: auto;">
                <table class="table table-hover mb-0">
                    <thead class="text-white position-sticky top-0 shadow-sm align-middle" style="z-index: 1; background-color: #0d6efd;">
                        <tr class="text-uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px;">
                            <th class="text-center py-3 border-bottom-0" style="width: 5%;">No</th>
                            <th class="py-3 border-bottom-0" style="width: 10%;">NIU</th>
                            <th class="py-3 border-bottom-0" style="width: 25%;">Nama</th>
                            <th class="text-center py-3 border-bottom-0" style="width: 10%;">Angkatan</th>
                            <th class="text-center py-3 border-bottom-0" style="width: 12%;">Tahun Lulus</th>
                            <th class="py-3 border-bottom-0" style="width: 20%;">Email</th>
                            <th class="py-3 border-bottom-0" style="width: 10%;">Lokasi</th>
                            <th class="text-center py-3 border-bottom-0" style="width: 8%;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="border-top-0 align-middle">
                        <tr><td colspan="8" class="text-center py-5 text-muted"><div class="spinner-border spinner-border-sm me-2" role="status"></div>Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="d-flex flex-column gap-2 mb-4">
        <div class="d-flex align-items-center gap-3">
            <input type="file" id="csvInput" accept=".csv" style="display: none;" onchange="handleUploadCSV(event)">
            <button class="btn btn-success rounded-pill px-4 shadow-sm" onclick="document.getElementById('csvInput').click()">
                <i class="bi bi-file-earmark-arrow-up me-2"></i> Tambah Data (CSV)
            </button>
            <button class="btn btn-outline-secondary rounded-pill px-4 shadow-sm" onclick="downloadTemplateCSV()">
                <i class="bi bi-download me-2"></i> Generate Template (CSV)
            </button>
        </div>
        <span class="text-muted small ms-2">*Format CSV (Wajib ada header di baris 1): NIU, Nama, Angkatan, Tahun Lulus, Email, Lokasi</span>
    </div>
</div>
